name: Release

# Build cross-platform binaries and attach them to a GitHub Release when a
# version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bin cx --bin cx-mcp

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dir="context-squeeze-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/cx" "target/${{ matrix.target }}/release/cx-mcp" "$dir"/
          cp README.md LICENSE "$dir"/
          tar czf "$dir.tar.gz" "$dir"
          echo "ASSET=$dir.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          dir="context-squeeze-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/cx.exe" "target/${{ matrix.target }}/release/cx-mcp.exe" "$dir"/
          cp README.md LICENSE "$dir"/
          7z a "$dir.zip" "$dir" >/dev/null
          echo "ASSET=$dir.zip" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          draft: true
          generate_release_notes: true
